name: Skill Sync

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Additional instructions (optional)'
        required: false
        default: ''

jobs:
  skill-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install mmk CLI
        run: npm install -g @magic-meal-kits/cli@beta

      - name: Run Skill Sync
        id: skill-sync
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            /skill-sync
            ${{ github.event.inputs.prompt }}
